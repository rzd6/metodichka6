<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание поездов</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1f2e;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #0f1419;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      opacity: 0.7;
    }

    .header-title {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .header-sub {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      margin-left: auto;
    }

    .sheet-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="#f5c518" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <span class="header-title">Расписание поездов</span>
      <span class="header-sub">только просмотр</span>
    </div>
    <iframe
      class="sheet-frame"
      src="https://docs.google.com/spreadsheets/d/1hJNbc8TuU9Plrv8_1Ho5xq8RpXkZ4peFC8_pREO__So/embed?rm=minimal"
      title="Расписание поездов"
      scrolling="yes"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
    ></iframe>
  </div>
</body>
</html>
